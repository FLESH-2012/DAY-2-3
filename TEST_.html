<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .card {
  position: relative;
  width: 300px;
  height: 200px;
  background: #333;
}

.details {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  opacity: 0;
  color: white;
  font-size: 20px;
}

.card:hover .details {
  opacity: 1;
}  
    </style>
   
</head>
<body>
    <div class="card">
  <div class="details">Details</div>
</div>
</body>
</html>
