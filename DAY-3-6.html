    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Combinators</title>

<style>

header{
  background-color: beige;
  padding: 20px;
}

h2 ~ p{
  font-weight: bold;
  color: violet;
}


h2 + p{
  color: green;
}

</style>
</head>

<body>

<header>
  <p>Not a subsequent sibling</p>

  <h2>This is a heading</h2>

  <p>This is a paragraph</p>
  <p>This is a paragraph</p>
  <p>This is a paragraph</p>
  <p>This is a paragraph</p>
</header>

</body>
</html>
</body>
</html>
