<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
    width: 250px;
    padding: 30px 20px;
    text-align: center;
    border-radius: 15px;
    
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    position: relative;
}

/* pastki qora qismi */
.card::after {
    content: "";
    position: absolute;
    bottom: -15px;
    left: 0;
    width: 100%;
    height: 40px;
    background: #0b1c2c;
    border-radius: 0 0 15px 15px;
    z-index: -1;
}

/* avatar */
.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    margin-bottom: 15px;
}

/* text */
.card h2 {
    color: white;
    margin-bottom: 10px;
}

.card p {
    color: #d9f3ff;
    font-size: 14px;
    margin-bottom: 10px;
}

.card a {
    display: block;
    color: yellow;
    margin-bottom: 15px;
    text-decoration: none;
    font-size: 14px;
}

/* button */
.card button {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    background: white;
    cursor: pointer;
}
    </style>
</head>
<body>
    <div class="card">
    <img src="https://i.pravatar.cc/100" alt="profile" class="avatar">
    <h2>Creative Studio</h2>
    <p>Visual Design & Web Interaction</p>
    <a href="#">Search My Work</a>
    <button>Hello World</button>
</div>
</body>
</html>
