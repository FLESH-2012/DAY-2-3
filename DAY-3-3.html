<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Background Image</title> 
 <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        height: 100vh ;
        padding: 50px;
        background-image: url("https://img.static-kl.com/transform/45e91fa8-5929-47a2-9e09-a96d0af6beb2/");
        background-repeat: no-repeat;
        background-size: cover;
    }
   div{
    width: 300px;
    height: 300px;
    display: inline-block;
    margin-right: 50px;
    border: 5px solid black;
}

.alpha{
    background-color: rgba(200, 0, 0, 0.7);
}

.opacity{
    background-color: blue;
    opacity: 0.7;
}   

  </style>
</head>
<body>
 <div class="alpha"></div>
    <div class="opacity"></div>
</body>
</html>
