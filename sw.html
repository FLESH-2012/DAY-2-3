
    <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>SkillFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">SkillFlow</div>

    <nav class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Courses</a>
        <a href="#">Progress</a>
        <a href="#">Community</a>
    </nav>

    <div class="user">
        <strong>Akmal</strong>
        <span>IT Park • Level 12</span>
    </div>
</header>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

.navbar {
    background-color: #2f3e4e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 30px;
}

.menu a {
    text-decoration: none;
    color: #dcdcdc;
    font-size: 16px;
    transition: 0.3s;
}

.menu a:hover {
    color: white;
}

.user {
    text-align: right;
    font-size: 14px;
}

.user span {
    display: block;
    font-size: 12px;
    color: #c0c0c0;
}
</style>

</body>
</html>
</body>
</html>
