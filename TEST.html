<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     
        div{
            width: 400px;
            height: 300px;
            margin: 30px;
            background-color: aqua;
            border-radius: 20px;
            margin: auto;
        }
      .container{
        width: 400px;
            height: 300px;
            margin: 30px;
            background-color: aqua;
            border-radius: 20px;
            margin: auto;
      }
         h1{
          text-align: center;
          padding-top: 20px;
         }
         p{
          text-align: center;
          font-size: 20px;
          color: turquoise;
         }
         h3{
          text-align: center;
          padding-top: 20px;
          color: yellow;
         }
         .profile-pic {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            border-radius: 50%;
            background-image: url('https://picsum.photos/id/64/200/200');
            background-size: cover;
            border: 3px solid rgba(255, 255, 255, 0.5);
            margin: 0 auto;
        }

          .card > h1 { 
            font-size: 1.5rem;
        }

        .card p { 
            opacity: 0.7; 
            font-size: 0.9rem;
         
        }
        a[href*="google"] {
            color: #fbbf24;
            text-decoration: none;
            font-size: 0.8rem;
            display: block;
            margin-top: 10px;
        }
    button {
        margin: 20px 0;
        padding: 10px 20px;
        background: white;
        color: black;
        border: none;
        border-radius: 8px;
    }
      .card {
          position: absolute; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            
      }
          
   </style>
</head>
<body>
    <div class="card">
    <div class="profile-pic"></div>
    <div class="container">
          <h1>Creative Studio</h1>
    <p>Visual Design & Web Interaction</p>
    <h3>Search My Work</h3>
    <button>Hover for Details</button>
    </div>
 
   
</body>
</html>
